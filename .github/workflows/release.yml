name: Release on PR merge

# Fires on every push to main (i.e. every PR merge — branch protection
# requires PRs, so a push to main IS a merge). Cuts a GitHub Release tagged
# v1.1.<RUN_NUMBER> with cross-compiled binaries (linux x64-baseline +
# arm64, darwin x64 + arm64, windows x64 + arm64) and a SHA256SUMS file.
# `phantombot update` reads this feed.
#
# Why `push: main` and NOT `pull_request: closed`: a PR merged from a
# FORK runs the closed-PR workflow with a *read-only* GITHUB_TOKEN —
# GitHub strips write scope from fork-triggered pull_request runs by
# design, so `gh release create` 403s ("Resource not accessible by
# integration"). This bit us on v1.1.100 (PR #151, the first external
# fork contribution). A `push` to a branch in THIS repo always runs with
# the base repo's full read-write token regardless of where the merged
# code originated, because the merge commit already lives on main. We do
# NOT use `pull_request_target` (the other fork-write option) on purpose:
# it would run unreviewed fork code with secrets + write scope BEFORE
# merge. push fires only AFTER review + merge, so the code is already trusted.
#
# The workflow `name:` is deliberately left as "Release on PR merge" and
# the file path is unchanged: github.run_number is keyed to the workflow
# file and must never regress (it IS the version number — see below), so
# we avoid anything that could reset the counter. Every push to main is
# still a PR merge, so the name stays accurate.
#
# Why github.run_number and not the PR number: PR numbers can regress
# if a later-numbered PR is merged before an earlier-numbered one
# (e.g. PR #50 lands while #49 is still in review, then #49 lands and
# would produce v1.0.49 *after* v1.0.50). `phantombot update` does string
# equality on the latest release tag, but humans reading "version went
# backwards" get confused, and any future ordering heuristic breaks.
# github.run_number is a per-workflow monotonic counter — it only ever
# goes up, and every value points to exactly one Actions run, so we can
# pivot from a deployed binary to the build that produced it in one click.
# The originating PR number is preserved in the release title and notes
# so the audit trail (which PR shipped what) is still intact.
#
# Why the minor bump from 1.0 → 1.1: the first run under run_number-based
# tagging would have been v1.0.64, which collided with the old PR-numbered
# v1.0.64 (from PR #64 back in early May 2026) and made `gh release create`
# fail with "tag already exists". The PR-numbered era went up to ~v1.0.109,
# so any run_number under ~110 would have collided. Bumping minor to 1.1
# gives us a clean namespace with no overlap, while the run_number itself
# keeps its meaning (it's still the per-workflow counter, just one minor
# slot higher). Don't bump minor again on the next collision risk —
# there isn't one; run_number only grows from here and 1.1.<N> can run
# to infinity.
#
# Why every PR (not manual tags): the user runs `phantombot update --force
# --restart` from cron and wants always-fresh binaries. If a PR shouldn't
# release, we'll add a `release:skip` label gate later.
#
# Why bun-linux-x64-baseline (and not plain bun-linux-x64): one of the
# deploy targets (the `kw-openclaw` supervisor box that runs kai) is older
# silicon without AVX2. The non-baseline target SIGILLs on launch there.
# Don't 'optimise' to plain x64 without verifying every deploy target has
# AVX2 — see the SIGILL post-mortem from the May 2026 first deploy.

on:
  push:
    branches: [main]

permissions:
  contents: write        # create release + upload assets
  pull-requests: read    # commits->pulls lookup for release title/notes audit trail

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pushed commit
        uses: actions/checkout@v4
        with:
          # github.sha on a push to main is the merge commit itself.
          ref: ${{ github.sha }}

      - name: Resolve originating PR (audit trail only)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On a push event there is no github.event.pull_request context,
          # so recover the PR that introduced this merge commit from the
          # commits→pulls API. This is best-effort: a direct push to main
          # (no PR) yields an empty number, and the release still cuts —
          # the PR ref is purely for the audit trail in the title/notes.
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" 2>/dev/null || echo '[]')
          NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // ""')
          TITLE=$(echo "$PR_JSON" | jq -r '.[0].title // ""')
          # Fall back to the commit subject if no PR was found.
          if [ -z "$TITLE" ]; then
            TITLE=$(git log -1 --pretty=%s)
          fi
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "Resolved PR number='$NUMBER' title='$TITLE'"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to a major to keep releases reproducible. A point-release
          # regression in `bun --compile` would otherwise silently break
          # every PR merge until upstream ships a fix, and historical
          # binaries wouldn't carry a recoverable build-toolchain version.
          bun-version: 1.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Test
        run: bun test

      - name: Compute version + bake into src/version.ts
        id: version
        env:
          # RUN_NUMBER is the per-workflow monotonic counter (never
          # regresses). PR_NUMBER is kept around purely for the audit
          # trail in the release title and notes — it is no longer part
          # of the version string itself. See the file header comment
          # for the why.
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="1.1.${RUN_NUMBER}"
          TAG="v${VERSION}"
          # Replace only the literal placeholder so the doc comment in
          # src/version.ts (and any future sibling const) survives. The
          # placeholder must round-trip exactly; see the file's comment.
          sed -i "s/0.1.0-dev/${VERSION}/" src/version.ts
          # Sanity check: the constant must now match VERSION exactly,
          # otherwise the binary would lie about its own version and
          # phantombot update would loop.
          grep -q "VERSION = \"${VERSION}\"" src/version.ts \
            || { echo "version injection failed"; cat src/version.ts; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Rebuild the embedded VS Code extension from THIS commit's source and
      # stamp it with the release version, before any --compile step reads the
      # generated module.
      #
      # This step exists because leaving it manual shipped a broken release:
      # PR #296 fixed the extension, but nobody re-ran `gen:vscode-vsix` and
      # nobody bumped editors/vscode/package.json, so v1.1.204 embedded a
      # .vsix built from PRE-#296 source at the SAME version clients already
      # had. `installVscode` compares versions and skips when
      # `installed >= bundled`, so every client skipped it as "current". The
      # fix reached nobody and `phantombot update` still reported success.
      #
      # Regenerating here makes both halves structurally impossible: the .vsix
      # can never lag the merged source, and the version always increases
      # (run_number is monotonic), so clients always install. `phantombot
      # update` alone is now sufficient to deliver an extension fix — which is
      # the only update path a user should ever need.
      - name: Rebuild + stamp the embedded VS Code extension
        env:
          PHANTOMBOT_EXT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          bun run gen:vscode-vsix
          # The compiled binary is what users get; if it embedded the wrong
          # version the install would be skipped client-side and we'd never
          # know. Fail loudly here instead.
          grep -q "VSCODE_EXTENSION_VERSION = \"${PHANTOMBOT_EXT_VERSION}\"" \
            src/lib/vscodeExtensionAsset.generated.ts \
            || { echo "vsix version stamp failed"; exit 1; }

      - name: Build x64 (baseline — no AVX2 required)
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64-baseline \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-linux-x64"

      - name: Build arm64
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          bun build --compile --target=bun-linux-arm64 \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-linux-arm64"

      - name: Build darwin-x64 (Intel Mac)
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Cross-compiled from the Linux runner; Bun emits an unsigned
          # Mach-O. install.sh handles the xattr / ad-hoc codesign dance.
          bun build --compile --target=bun-darwin-x64 \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-darwin-x64"

      - name: Build darwin-arm64 (Apple Silicon)
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Cross-compiled from the Linux runner; Bun emits an unsigned
          # Mach-O. First-run on macOS will be quarantined by Gatekeeper —
          # see release notes for the `xattr -d com.apple.quarantine` step.
          bun build --compile --target=bun-darwin-arm64 \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-darwin-arm64"

      - name: Build windows-x64
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Cross-compiled from the Linux runner; Bun emits an unsigned PE
          # (.exe). Windows SmartScreen may warn on first run for an
          # unsigned binary - see release notes. --windows-hide-console is
          # NOT set: phantombot is a console agent and needs its stdio.
          bun build --compile --target=bun-windows-x64 \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-windows-x64.exe"

      - name: Build windows-arm64
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # ARM64 Windows (e.g. Surface Pro X, Dev Kit). Bun's compile
          # target id is bun-windows-arm64; the emitted PE is Aarch64.
          # Same unsigned/SmartScreen caveat as windows-x64.
          bun build --compile --target=bun-windows-arm64 \
            ./src/index.ts \
            --outfile "dist/phantombot-${TAG}-windows-arm64.exe"

      - name: Compute SHA256SUMS
        working-directory: dist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          sha256sum \
            "phantombot-${TAG}-linux-x64" \
            "phantombot-${TAG}-linux-arm64" \
            "phantombot-${TAG}-darwin-x64" \
            "phantombot-${TAG}-darwin-arm64" \
            "phantombot-${TAG}-windows-x64.exe" \
            "phantombot-${TAG}-windows-arm64.exe" \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Write release notes to file
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          SHA: ${{ github.sha }}
        run: |
          # PR_NUMBER is empty for a direct push (no PR). Render the
          # originating-PR lines only when we actually resolved one,
          # otherwise point at the commit so the audit trail still holds.
          if [ -n "$PR_NUMBER" ]; then
            ORIGIN_LINE="Originating PR: #${PR_NUMBER} — ${PR_TITLE}"
            PR_LINK_LINE="Pull request: ${SERVER_URL}/${REPO}/pull/${PR_NUMBER}"
          else
            ORIGIN_LINE="Originating commit: ${SHA} — ${PR_TITLE}"
            PR_LINK_LINE="Commit: ${SERVER_URL}/${REPO}/commit/${SHA}"
          fi
          cat > release-notes.md <<EOF
          Automated release from workflow run #${RUN_NUMBER} (run id ${RUN_ID}).
          ${ORIGIN_LINE}

          Build run: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}
          ${PR_LINK_LINE}

          Binaries:
          - phantombot-${TAG}-linux-x64 — x86-64, baseline (no AVX2 required)
          - phantombot-${TAG}-linux-arm64 — ARM64
          - phantombot-${TAG}-darwin-x64 — macOS x86-64 (unsigned; see below)
          - phantombot-${TAG}-darwin-arm64 — macOS Apple Silicon (unsigned; see below)
          - phantombot-${TAG}-windows-x64.exe - Windows x86-64 (unsigned; see below)
          - phantombot-${TAG}-windows-arm64.exe - Windows ARM64 (unsigned; see below)

          Verify with: sha256sum -c SHA256SUMS

          Install with: phantombot update

          macOS note: the darwin binaries are cross-compiled and unsigned.
          install.sh handles the xattr / ad-hoc codesign dance for you. If
          you download the binary directly, clear the Gatekeeper quarantine
          attribute on first run:
            xattr -d com.apple.quarantine ./phantombot-${TAG}-darwin-arm64
            xattr -d com.apple.quarantine ./phantombot-${TAG}-darwin-x64

          Windows note: the .exe binaries are cross-compiled and unsigned, so
          SmartScreen may show a "Windows protected your PC" prompt on first
          run - choose More info then Run anyway, or unblock the file:
            Unblock-File .\\phantombot-${TAG}-windows-x64.exe
          EOF

      - name: Create GitHub Release with binary assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          SHA: ${{ github.sha }}
        run: |
          # --target pins the git tag to the exact commit we built from.
          # Without it, a second push landing mid-workflow would shift the
          # tag onto the wrong sha (binaries would still be correct, but
          # `git checkout v1.1.N` would lie about what code is in there).
          # Release title carries the PR number when we resolved one so the
          # GitHub Releases UI surfaces the originating PR without opening
          # the notes; a direct push falls back to a plain tag title.
          if [ -n "$PR_NUMBER" ]; then
            TITLE="$TAG (PR #${PR_NUMBER})"
          else
            TITLE="$TAG"
          fi
          gh release create "$TAG" \
            --target "$SHA" \
            --title "$TITLE" \
            --notes-file release-notes.md \
            "dist/phantombot-${TAG}-linux-x64" \
            "dist/phantombot-${TAG}-linux-arm64" \
            "dist/phantombot-${TAG}-darwin-x64" \
            "dist/phantombot-${TAG}-darwin-arm64" \
            "dist/phantombot-${TAG}-windows-x64.exe" \
            "dist/phantombot-${TAG}-windows-arm64.exe" \
            "dist/SHA256SUMS"
